base_url = "https://wantguns.dev"
description = "Gunwant Jain's (@wantguns) writings and musings"
title = "Gunwant Jain - @wantguns"

compile_sass = true
generate_feeds = true

taxonomies = [
    {name = "tags", feed = true},
]

[markdown]

[markdown.highlighting]
error_on_missing_language = true
extra_themes = [
    "themes/base16-black-metal-bathory.json",
    "themes/ash.json",
    "themes/ember.json",
]

theme = "vitesse-dark"

[extra]
author = "Gunwant Jain"
keywords = "Gunwant Jain, wantguns, Gunwant, WantGuns"
seo = true

nav_links = [
  {url = "$BASE_URL/about", name = "about"},
  {url = "$BASE_URL", name = "blog"},
  {url = "$BASE_URL/tags", name = "tags"},
  {url = "https://github.com/wantguns", name = "github"},
  {url = "https://bin.wantguns.dev/cv", name = "resume"},
  {url = "$BASE_URL/atom.xml", name = "rss"},
]
